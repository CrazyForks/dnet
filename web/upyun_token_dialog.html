<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="utf-8">
    <title>获取又拍云 Token</title>
    <link rel="stylesheet" href="/static/css/layui.css">
    <style>
        body { margin: 0; padding: 20px 24px; }
    </style>
</head>
<body>
<div class="layui-form-item">
    <label class="layui-form-label">用户名</label>
    <div class="layui-input-block">
        <input type="text" id="upyun-dlg-username" class="layui-input" placeholder="又拍云账号用户名">
    </div>
</div>
<div class="layui-form-item">
    <label class="layui-form-label">密码</label>
    <div class="layui-input-block">
        <div style="display:flex;gap:10px">
            <input type="password" id="upyun-dlg-password" class="layui-input" placeholder="又拍云账号密码">
            <button type="button" id="upyun-dlg-fetch" class="layui-btn layui-btn-normal" style="white-space:nowrap">获取 Token</button>
        </div>
    </div>
</div>
<div class="layui-form-item">
    <label class="layui-form-label">Token</label>
    <div class="layui-input-block">
        <div style="display:flex;gap:10px">
            <input type="text" id="upyun-dlg-token" class="layui-input" placeholder="获取成功后显示" readonly>
            <button type="button" id="upyun-dlg-copy" class="layui-btn layui-btn-normal" style="white-space:nowrap"><i class="layui-icon layui-icon-file"></i> 复制</button>
        </div>
    </div>
</div>
<script src="/static/layui.js"></script>
<script>
layui.use(function () {
    var $ = layui.$;
    var layer = layui.layer;

    var cachedToken = window.parent._upyunCachedToken;
    if (cachedToken) {
        $('#upyun-dlg-token').val(cachedToken);
    }

    $('#upyun-dlg-fetch').on('click', function () {
        var username = $('#upyun-dlg-username').val().trim();
        var password = $('#upyun-dlg-password').val().trim();
        if (!username || !password) {
            layer.msg('请输入用户名和密码', {icon: 2, time: 2000});
            return;
        }
        var loadIdx = layer.load(2);
        $.ajax({
            type: 'POST',
            url: '/api/dcdn/upyun/token',
            contentType: 'application/json',
            dataType: 'json',
            data: JSON.stringify({username: username, password: password}),
            success: function (res) {
                layer.close(loadIdx);
                if (res.status) {
                    $('#upyun-dlg-token').val(res.data);
                    window.parent._upyunCachedToken = res.data;
                    layer.msg('Token 获取成功', {icon: 1, time: 2000});
                } else {
                    layer.msg(res.msg || '获取失败，请检查账号密码', {icon: 2, time: 3000});
                }
            },
            error: function () {
                layer.close(loadIdx);
                layer.msg('请求失败，请重试', {icon: 2, time: 2500});
            }
        });
    });

    $('#upyun-dlg-copy').on('click', function () {
        var token = $('#upyun-dlg-token').val();
        if (!token) {
            layer.msg('暂无 Token 可复制', {icon: 2, time: 1500});
            return;
        }
        if (navigator.clipboard) {
            navigator.clipboard.writeText(token).then(function () {
                layer.msg('已复制到剪贴板', {icon: 1, time: 1500});
            });
        } else {
            $('#upyun-dlg-token')[0].select();
            document.execCommand('copy');
            layer.msg('已复制到剪贴板', {icon: 1, time: 1500});
        }
    });
});
</script>
</body>
</html>
